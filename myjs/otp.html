<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #four,#six{
            background-color: rgb(221, 65, 104);
            color: white;
            margin-top: 6.5%;
            padding: 23px;
            width: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: large;
            font-weight: bolder;
            border: 2px solid  rgb(221, 65, 104);
            border-radius: 4px;
          
        }
        #four{
            display: inline-block;
             margin-left:32%;
            margin-right: 20px;
        }
        #six{
            display: inline-block;
        }
       #display{
         margin-top: 14%;
        text-align: center;
        font-size:35px;
        font-weight: bolder;
         font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         color:rgb(21, 21, 144);
       }
    </style>
</head>
<body>
  <div id ="display"> </div>
  <button onclick="otp4_generated()" id="four">Generate 4-digit OTP</button>
  <button onclick="otp6_generated()" id="six">Generate 6-Digit OTP</button>
  <script>
    function otp4_generated(){
        const otp=Math.floor((1000+Math.random()*9000));
        document.getElementById("display").textContent=otp
    }
    function otp6_generated(){
        const otp=Math.floor((100000+Math.random()*900000));
        document.getElementById("display").textContent=otp 
    }
  </script>
</body>
</html>
